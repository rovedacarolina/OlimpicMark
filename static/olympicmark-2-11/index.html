<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olympic Mark</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

  <link rel="stylesheet" href="olympicmark.css" />
</head>
<body>

  <!-- UNA SOLA MAPPA: viene usata sia come sfondo della landing sia come mappa interattiva -->
  <div id="map"></div>

  <!-- Overlay landing originale: mantiene lo stesso look del tuo primo file -->
  <div class="bg-overlay"></div>

  <!-- Overlay mappa originale: entra solo quando arrivi nella sezione mappa -->
  <div class="overlay"></div>

  <nav class="topbar">
    <div class="nav-switch">
      <button class="nav-btn" id="mapBtn" aria-label="Vai alla mappa">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/>
          <line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
      </button>
      <button class="nav-btn active" id="indexBtn" aria-label="Torna alla home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Landing: stesse classi, stesse misure e stesse posizioni del tuo index originale -->
  <main class="hero-content">
    <p class="hero-label hero-hover">Milano · Cortina 2026</p>

<h1 class="hero-title hero-hover" id="mainTitle">
  I LUOGHI <br> OLIMPICI 
</h1>

<p class="hero-desc hero-hover">
  Esplora i luoghi olimpici sul territorio.<br>
  Un atlante interattivo delle eredità dei Giochi.
</p>
  </main>

  <!-- Spazio reale di scroll. La mappa resta fissa sotto e non viene mai duplicata. -->
  <section class="scroll-space" aria-hidden="true"></section>
  <section class="focus-space" aria-hidden="true"></section>

  <!-- Controlli della mappa: identici al tuo secondo HTML, ma visibili solo nella vista mappa -->
  <div class="map-controls">
    <button class="map-ctrl-btn" id="resetBtn" title="Vista generale">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L4 21l8-4 8 4-8-19z"/>
        <path d="M12 2v15"/>
      </svg>
    </button>
    <button class="map-ctrl-btn route-btn" id="routeBtn" title="Inizio percorso">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 19c4-9 10 1 14-10"/>
        <circle cx="5" cy="19" r="2"/>
        <circle cx="19" cy="9" r="2"/>
      </svg>
    </button>
    <button class="map-ctrl-btn" id="zoomInBtn" title="Zoom in">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <button class="map-ctrl-btn" id="zoomOutBtn" title="Zoom out">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>




  <div class="place-preview" id="placePreview" aria-hidden="true">
    <img id="placePreviewImg" src="" alt="" />
  </div>
  <div class="place-title" id="placeTitle" aria-hidden="true"></div>
  <div class="region-tooltip" id="regionTooltip" aria-hidden="true"></div>

  <div class="photo-modal" id="photoModal">
    <button class="photo-close" id="photoClose">✕</button>
    <img id="photoImg" src="" alt="" />
    <p class="photo-caption" id="photoCaption"></p>
  </div>

  <script src="olympicmark.js"></script>
</body>
</html>
